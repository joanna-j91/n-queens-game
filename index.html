<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=0" />
    <meta name=" title" content="N-Queens Maze" />>

    <title>Board Of NQueens Maze</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="style.css">
    <meta property="og:image" content="/screenshots/board.png" />
    <title>Board Of NQueens Maze</title>
</head>

<body>
    <div class="app">
        <nav id="win-msg" style="display: none;">
            Yahh! You won!
        </nav>

        <h1 class="title-header">
            Board Of N Queens
        </h1>
        <p class="title-desc">
            A Simple Computer Science Problem
        </p>
        <div class="btns">
            <button id="reset-btn" class="btn">
                Reset
            </button>
            <select id="size-select" class="btn">
                <option value="4">4×4</option>
                <option value="5">5×5</option>
                <option value="6">6×6</option>
                <option value="7">7×7</option>
                <option value="8" selected>8×8</option>
                <option value="10">10×10</option>
                <option value="12">12×12</option>
            </select>
        </div>
        <div id="queens">
            👑👑👑👑👑👑👑
        </div>
        <div id="board"></div>
        <div id="stuck-msg" style="display: none; color: #FF7276; margin: 0.5rem 0; font-size: 0.9rem;">
             No valid moves left — remove a queen to continue
        </div>

    </div>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/party-js@latest/bundle/party.min.js"></script>
</body>

</html>
